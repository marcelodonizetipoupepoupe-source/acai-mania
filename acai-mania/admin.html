<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}
.container{
  max-width:1000px;
  margin:40px auto;
  padding:20px;
}
.card{
  background:#1e1e1e;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}
input,button{
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  border:none;
  font-size:15px;
}
button{
  background:#7b1fa2;
  color:#fff;
  cursor:pointer;
}
.btnDelete{
  background:#d32f2f;
}
.pedido{
  border:1px solid #444;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}
.hidden{
  display:none;
}
.relatorioBox{
  background:#222;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}
</style>
</head>
<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h2>Login Administrador</h2>
  <input type="text" id="usuario" placeholder="Usuário">
  <input type="password" id="senha" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <p id="erroLogin" style="color:red;"></p>
</div>

<!-- PAINEL -->
<div id="painel" class="hidden">

  <div class="card">

    <h2>Relatórios</h2>

    <h3>Filtro por Dia</h3>
    <input type="date" id="filtroDia">
    <button onclick="filtrarDia()">Filtrar Dia</button>

    <h3>Relatório por Período</h3>
    <label>Data Inicial:</label>
    <input type="date" id="dataInicio">
    <label>Data Final:</label>
    <input type="date" id="dataFim">
    <button onclick="filtrarPeriodo()">Calcular Período</button>

    <div class="relatorioBox">
      <p id="totalDia">Total do Dia: R$ 0,00</p>
      <p id="totalPeriodo">Total do Período: R$ 0,00</p>
      <p id="totalMes">Total do Mês Atual: R$ 0,00</p>
    </div>

    <hr>

    <button onclick="exportarClientes()">Exportar Clientes (.txt)</button>
    <button class="btnDelete" onclick="apagarHistorico()">Apagar Histórico</button>
    <button onclick="limparFiltro()">Limpar Filtros</button>
    <button onclick="logout()">Sair</button>

  </div>

  <div id="listaPedidos"></div>

</div>

</div>

<script>
const ADMIN_USER = "Knove";
const ADMIN_PASS = "150218Kh@";

function login(){
  const user = document.getElementById("usuario").value;
  const pass = document.getElementById("senha").value;

  if(user === ADMIN_USER && pass === ADMIN_PASS){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("painel").classList.remove("hidden");
  }else{
    document.getElementById("erroLogin").innerText = "Usuário ou senha incorretos";
  }
}

function logout(){
  location.reload();
}
</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_KEY_AQUI",
  authDomain: "barrigas-burguer.firebaseapp.com",
  projectId: "barrigas-burguer"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("listaPedidos");
let pedidosCache = [];

onSnapshot(collection(db, "pedidos"), (snapshot)=>{
  pedidosCache = [];
  lista.innerHTML = "";

  snapshot.forEach((docSnap)=>{
    const p = docSnap.data();
    p._id = docSnap.id;
    pedidosCache.push(p);
  });

  renderizarPedidos(pedidosCache);
  calcularMesAtual();
});

function renderizarPedidos(listaPedidos){
  lista.innerHTML = "";

  listaPedidos.forEach(p=>{
    const c = p.cliente || {};

    const div = document.createElement("div");
    div.className="pedido";

    div.innerHTML = `
      <strong>Pedido Nº:</strong> ${p.numero}<br>
      <strong>Data:</strong> ${p.data}<br>
      <strong>Cliente:</strong> ${c.nome}<br>
      <strong>Total:</strong> R$ ${Number(p.total).toFixed(2)}<br><br>
      <button class="btnDelete" onclick="apagarPedido('${p._id}')">Apagar</button>
    `;

    lista.appendChild(div);
  });
}

window.filtrarDia = function(){
  const dataInput = document.getElementById("filtroDia").value;
  if(!dataInput) return alert("Selecione uma data");

  const dataFormatada = new Date(dataInput).toLocaleDateString("pt-BR");

  const filtrados = pedidosCache.filter(p => p.data === dataFormatada);

  renderizarPedidos(filtrados);

  let total = 0;
  filtrados.forEach(p => total += Number(p.total || 0));

  document.getElementById("totalDia").innerText =
    "Total do Dia: R$ " + total.toFixed(2);
};

window.filtrarPeriodo = function(){
  const inicio = document.getElementById("dataInicio").value;
  const fim = document.getElementById("dataFim").value;

  if(!inicio || !fim) return alert("Selecione as duas datas");

  const dataInicio = new Date(inicio);
  const dataFim = new Date(fim);

  let totalPeriodo = 0;

  const filtrados = pedidosCache.filter(p=>{
    if(!p.data) return false;

    const partes = p.data.split("/");
    const dataPedido = new Date(partes[2], partes[1]-1, partes[0]);

    return dataPedido >= dataInicio && dataPedido <= dataFim;
  });

  filtrados.forEach(p=> totalPeriodo += Number(p.total || 0));

  renderizarPedidos(filtrados);

  document.getElementById("totalPeriodo").innerText =
    "Total do Período: R$ " + totalPeriodo.toFixed(2);
};

function calcularMesAtual(){
  const hoje = new Date();
  const mes = hoje.getMonth();
  const ano = hoje.getFullYear();

  let totalMes = 0;

  pedidosCache.forEach(p=>{
    if(!p.data) return;

    const partes = p.data.split("/");
    const dataPedido = new Date(partes[2], partes[1]-1, partes[0]);

    if(dataPedido.getMonth() === mes && dataPedido.getFullYear() === ano){
      totalMes += Number(p.total || 0);
    }
  });

  document.getElementById("totalMes").innerText =
    "Total do Mês Atual: R$ " + totalMes.toFixed(2);
}

window.apagarPedido = async function(id){
  if(!confirm("Deseja apagar este pedido?")) return;
  await deleteDoc(doc(db, "pedidos", id));
};

window.apagarHistorico = async function(){
  if(!confirm("Tem certeza que deseja apagar TODOS os pedidos?")) return;

  const snapshot = await getDocs(collection(db, "pedidos"));
  snapshot.forEach(async (docSnap)=>{
    await deleteDoc(doc(db, "pedidos", docSnap.id));
  });

  alert("Histórico apagado com sucesso!");
};

window.limparFiltro = function(){
  renderizarPedidos(pedidosCache);
  document.getElementById("filtroDia").value = "";
  document.getElementById("dataInicio").value = "";
  document.getElementById("dataFim").value = "";
};

window.exportarClientes = async function(){

  const snapshot = await getDocs(collection(db, "pedidos"));
  let conteudo = "";

  snapshot.forEach((docSnap)=>{
    const p = docSnap.data();
    const c = p.cliente || {};

    conteudo += 
`Nome: ${c.nome}
CPF: ${c.cpf}
Telefone: ${c.telefone}
Endereço: ${c.endereco}, Nº ${c.numero}
---------------
`;
  });

  const hoje = new Date();
  const dia = String(hoje.getDate()).padStart(2, '0');
  const mes = String(hoje.getMonth() + 1).padStart(2, '0');
  const ano = hoje.getFullYear();

  const nomeArquivo = `clientes_${dia}-${mes}-${ano}.txt`;

  const blob = new Blob([conteudo], { type: "text/plain;charset=utf-8" });
  const link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = nomeArquivo;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
};

</script>

</body>
</html>
